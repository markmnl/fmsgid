name: Build & Test

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - name: Build
        working-directory: src
        run: go build ./...

      - name: Test
        working-directory: src
        run: go test ./...
